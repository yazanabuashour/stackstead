# Merge these hooks into the repository's .config/wt.toml.
# Replace /absolute/trusted/stackstead-hooks with an owner-controlled installation.
[pre-start]
stackstead = "/absolute/trusted/stackstead-hooks/adopt-current.sh"

[pre-remove]
stackstead = "STACKSTEAD_MANAGER_TEARDOWN=1 /absolute/trusted/stackstead-hooks/destroy-adopted-current.sh"
